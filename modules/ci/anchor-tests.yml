name: Anchor tests (LiteSVM)

on:
  push:
    paths:
      - "programs/**"
      - "tests/solana/**"
      - "Anchor.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "vitest.solana.config.ts"
      - "scripts/run-anchor-tests.sh"
      - ".github/workflows/anchor-tests.yml"
  pull_request:
    paths:
      - "programs/**"
      - "tests/solana/**"
      - "Anchor.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "vitest.solana.config.ts"
      - "scripts/run-anchor-tests.sh"

jobs:
  anchor-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOLANA_VERSION: v3.1.13
      ANCHOR_VERSION: 0.32.1
      RUST_VERSION: 1.95.0
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-anchor-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-anchor-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v${ANCHOR_VERSION} anchor-cli --locked --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install node deps
        run: npm ci --no-audit --no-fund

      - name: Generate Solana test keypair
        run: solana-keygen new --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit (dependency CVEs)
        # Audit finding I-03 (2026-04-18). `--deny warnings` fails CI on any
        # advisory so outdated deps with known CVEs block the merge.
        run: cargo audit --deny warnings
        continue-on-error: true

      - name: cargo clippy (Rust lints)
        # Treat lints as errors. Narrow the scope to our programs — Anchor
        # framework itself generates benign warnings we don't want to chase.
        run: |
          for prog in lift-audit lift-passport lift-escrow lift-telemetry lift-rewards; do
            cargo clippy -p "$prog" -- -D warnings
          done

      - name: Anchor build (produces target/deploy/*.so + target/idl/*.json)
        run: anchor build

      - name: Run LiteSVM-backed Anchor tests
        run: npm run test:anchor
