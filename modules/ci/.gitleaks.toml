# gitleaks configuration for LiftSolana
#
# Detects: Solana keypairs (JSON array of 64 ints), bs58 private keys,
# explicit PRIVATE_KEY / secretKey identifiers, AWS keys, Anthropic API keys,
# generic JWT tokens.
#
# Exclusions: vendor / build / docs / example files.

title = "LiftSolana gitleaks ruleset"

[extend]
# Start from the upstream default ruleset and layer our rules on top of it.
useDefault = true

# ─────────────────────────────────────────────────────────────────────────────
# Solana / crypto-specific rules
# ─────────────────────────────────────────────────────────────────────────────

[[rules]]
id = "solana-keypair-json"
description = "Solana keypair exported as a JSON array of 64 unsigned bytes"
# Match a JSON array of at least 60 comma-separated 1-3 digit numbers.
# Real Solana secret keys are exactly 64 bytes; we allow some slack to catch
# truncated pastes while still avoiding false positives on short arrays.
regex = '''\[\s*(?:\d{1,3}\s*,\s*){60,}\d{1,3}\s*\]'''
tags = ["solana", "keypair", "secret"]

[[rules]]
id = "solana-secret-key-literal"
description = "Literal `secretKey` assignment (JS/TS object or JSON field)"
regex = '''(?i)\bsecret[_-]?key\b["']?\s*[:=]\s*["'\[]'''
tags = ["solana", "secret"]

[[rules]]
id = "bs58-private-key"
description = "bs58-encoded private key (87-88 chars typical for ed25519 secret)"
# bs58 alphabet, length 87-88 (Solana secret export format from `solana-keygen`)
regex = '''\b[1-9A-HJ-NP-Za-km-z]{87,88}\b'''
tags = ["solana", "bs58", "secret"]

[[rules]]
id = "private-key-identifier"
description = "Generic PRIVATE_KEY identifier with inline value"
regex = '''(?i)\b(?:private[_-]?key|priv[_-]?key)\b["']?\s*[:=]\s*["'][^"']{16,}["']'''
tags = ["generic", "secret"]

# ─────────────────────────────────────────────────────────────────────────────
# Third-party API keys
# ─────────────────────────────────────────────────────────────────────────────

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key (sk-ant-*)"
regex = '''sk-ant-[A-Za-z0-9_-]{20,}'''
tags = ["api-key", "anthropic"]

[[rules]]
id = "aws-access-key-id"
description = "AWS access key ID"
regex = '''\b(?:AKIA|ASIA|AIDA|AROA|AIPA|ANPA|ANVA|AGPA)[0-9A-Z]{16}\b'''
tags = ["api-key", "aws"]

[[rules]]
id = "aws-secret-access-key"
description = "AWS secret access key"
regex = '''(?i)aws(.{0,20})?['"][0-9a-zA-Z\/+]{40}['"]'''
tags = ["api-key", "aws"]

# ─────────────────────────────────────────────────────────────────────────────
# Tokens
# ─────────────────────────────────────────────────────────────────────────────

[[rules]]
id = "jwt-token"
description = "Generic JWT (header.payload.signature)"
regex = '''\beyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b'''
tags = ["jwt", "secret"]

# ─────────────────────────────────────────────────────────────────────────────
# Allow-list
# ─────────────────────────────────────────────────────────────────────────────

[allowlist]
description = "Paths and files excluded from scanning"
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)\.next/''',
  '''(^|/)target/''',
  '''(^|/)dist/''',
  '''(^|/)build/''',
  '''(^|/)coverage/''',
  '''(^|/)\.husky/_/''',
  '''(^|/)docs/.*\.md$''',
  '''.*\.example$''',
  '''.*\.lock$''',
  '''package-lock\.json$''',
  '''Cargo\.lock$''',
  '''(^|/)tests/.*rbac\.test\.ts$''',
]

# Known-safe constants (documentation / standard Solana program IDs etc).
regexTarget = "match"
regexes = [
  # USDC mint on Solana mainnet (public, documented).
  '''EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v''',
  # Base58 Program IDs in docs are fine — 32-44 chars, not 87-88.
  # (This is intentionally broad — full bs58-private-key regex only catches 87-88 chars.)
]
